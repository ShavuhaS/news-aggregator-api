info:
  name: Change password
  type: http
  seq: 7

http:
  method: PATCH
  url: "{{baseUrl}}/user/profile/password"
  body:
    type: json
    data: |-
      {
        "oldPassword": "password123",
        "newPassword": "newpassword123"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
