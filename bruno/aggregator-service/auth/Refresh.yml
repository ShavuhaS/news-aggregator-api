info:
  name: Refresh
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/auth/refresh"
  params: []
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status.toString().startsWith('2')) {
          bru.setEnvVar('accessToken', res.body.accessToken);
          bru.setEnvVar('refreshToken', res.body.refreshToken);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
