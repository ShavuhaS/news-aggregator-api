info:
  name: Login
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/auth/login"
  body:
    type: json
    data: |-
      {
        "username": "andreyhohotva2",
        "password": "password123"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status.toString().startsWith('2')) {
          bru.setEnvVar('accessToken', res.body.accessToken);
          bru.setEnvVar('refreshToken', res.body.refreshToken);
        } else {
          bru.setEnvVar('accessToken', res.body.refreshToken);
          bru.setEnvVar('refreshToken', '');
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
