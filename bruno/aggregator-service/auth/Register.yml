info:
  name: Register
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/auth/register"
  body:
    type: json
    data: |-
      {
        "email": "andreyhohotva2@gmail.com",
      //   "username": "",
        "password": "password123"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status.toString().startsWith('2')) {
          bru.setEnvVar('accessToken', res.body.accessToken);
          bru.setEnvVar('refreshToken', res.body.refreshToken);
        } else {
          bru.setEnvVar('accessToken', res.body.refreshToken);
          bru.setEnvVar('refreshToken', '');
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
