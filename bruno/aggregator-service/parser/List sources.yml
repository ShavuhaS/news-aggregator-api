info:
  name: List sources
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/parser/sources?page=1&pageSize=20&active=false&types=RSS&search=&sortBy=name&sortDir=ASC"
  params:
    - name: page
      value: "1"
      type: query
    - name: pageSize
      value: "20"
      type: query
    - name: active
      value: "false"
      type: query
    - name: types
      value: RSS
      type: query
    - name: search
      value: ""
      type: query
    - name: sortBy
      value: name
      type: query
    - name: sortDir
      value: ASC
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
