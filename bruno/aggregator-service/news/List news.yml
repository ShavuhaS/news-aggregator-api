      value: "20"
      type: query
    - name: categoryId
      value: ""
      type: query
    - name: locationId
      value: ""
      type: query
    - name: minSentiment
      value: "-1"
      type: query
    - name: maxSentiment
      value: "1"
      type: query
    - name: from
      value: ""
      type: query
    - name: to
      value: ""
      type: query
    - name: search
      value: ""
      type: query
    - name: sortBy
      value: sentiment
      type: query
