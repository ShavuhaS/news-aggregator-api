info:
  name: Update news category
  type: http
  seq: 9

http:
  method: PUT
  url: "{{baseUrl}}/news/:newsId/category"
  params:
    - name: newsId
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "categoryId": "uuid-of-the-category"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
