info:
  name: List nearby news
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/news/nearby"
  params:
    - name: lat
      value: "50.4501"
      type: query
    - name: lon
      value: "30.5234"
      type: query
    - name: dist
      value: "10"
      type: query
    - name: page
      value: "1"
      type: query
    - name: pageSize
      value: "20"
      type: query
    - name: search
      value: ""
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
